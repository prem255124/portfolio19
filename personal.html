<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | จึ้งมาก ม.6</title>
    <style>
        /* --- Reset & Base Settings --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            /* พื้นหลังไล่เฉดสีม่วงมาเจนต้าและชมพูนีออนสุดจึ้ง */
            background: linear-gradient(135deg, #1a0b2e, #311b92, #880e4f, #ff4081, #f48fb1);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Header หรูหราโปร่งแสง --- */
        header {
            background: rgba(26, 11, 46, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 64, 129, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 18px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo {
            color: #ff4081;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 64, 129, 0.8);
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4081;
            text-shadow: 0 0 10px rgba(255, 64, 129, 0.6);
        }

        /* --- Main Content Section --- */
        section {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* กล่องกระจกแก้วหรูหราออร่าเรืองแสง (Super Glassmorphism) */
        .premium-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(255, 64, 129, 0.2);
            max-width: 650px;
            width: 100%;
            z-index: 10;
            position: relative;
            overflow: hidden;
        }

        /* แถบสีนีออนวิ่งสุดหรูด้านบนกล่อง */
        .premium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #8e24aa, #ff4081, #00e5ff);
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #f48fb1, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* --- รูปแบบข้อมูลแบบ Futuristic Timeline --- */
        .info-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .info-row {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .info-row:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 64, 129, 0.4);
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.1);
        }

        .info-label {
            font-weight: 700;
            color: #ff4081;
            width: 140px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 400;
            flex-grow: 1;
        }

        /* ปุ่มกดดีไซน์นีออนเรืองแสง */
        .btn-glow {
            display: block;
            background: linear-gradient(90deg, #ff4081, #8e24aa);
            color: #ffffff;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            text-align: center;
            margin-top: 40px;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 64, 129, 0.4);
            transition: all 0.4s ease;
        }

        .btn-glow:hover {
            box-shadow: 0 0 35px rgba(255, 64, 129, 0.8);
            transform: translateY(-4px) scale(1.02);
        }

        /* --- เอฟเฟกต์ ❄️ และ 🤍 ตกหล่น --- */
        .falling-element {
            position: absolute;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
            color: rgba(255, 255, 255, 0.9);
            user-select: none;
            z-index: 1;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- แถบเมนูด้านบน -->
    <header>
        <div class="logo">MY SPACE ❄️🤍</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="personal.html" style="color: #ff4081;">Profile</a>
        </nav>
    </header>

    <!-- ส่วนเนื้อหาหลัก -->
    <section>
        <div class="premium-card">
            <h2>PERSONAL PROFILE 🎓</h2>
            
            <div class="info-container">
                <div class="info-row">
                    <span class="info-label">ชื่อ-นามสกุล</span>
                    <span class="info-value">[ นางสาวธิดารัตน์ กลิ่นทอง ]</span>
                </div>
                <div class="info-row">
                    <span class="info-label">ชื่อเล่น</span>
                    <span class="info-value">[ ปลื้มเปรม ]</span>
                </div>
                <div class="info-row">
                    <span class="info-label">ระดับชั้น</span>
                    <span class="info-value">มัธยมศึกษาปีที่ 6</span>
                </div>
                <div class="info-row">
                    <span class="info-label">แผนการเรียน</span>
                    <span class="info-value">[ วิทย์-คณิต ]</span>
                </div>
                <div class="info-row">
                    <span class="info-label">โรงเรียน</span>
                    <span class="info-value">[ พานทอง ]</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Motto</span>
                    <span class="info-value">ความพยายามไม่เคยทรยศใคร ตัวแม่จะแคร์เพื่อ! ❄️🤍</span>
                </div>
            </div>

            <!-- ปุ่มย้อนกลับพลังนีออน -->
            <a href="index.html" class="btn-glow">BACK TO HOME ✨</a>
        </div>
    </section>

    <!-- สคริปต์ทำหิมะและหัวใจตกเวอร์ชันนุ่มนวล -->
    <script>
        const elements = ['❄️', '🤍'];
        function createFallingElement() {
            const element = document.createElement('div');
            element.classList.add('falling-element');
            element.innerText = elements[Math.floor(Math.random() * elements.length)];
            element.style.left = Math.random() * 100 + 'vw';
            element.style.fontSize = Math.random() * 16 + 12 + 'px'; // ขนาด 12px - 28px
            element.style.animationDuration = Math.random() * 4 + 4 + 's'; // ตกแบบนุ่มนวลช้าลงนิดนึง 4-8 วินาที
            element.style.opacity = Math.random() * 0.4 + 0.6;
            document.body.appendChild(element);
            setTimeout(() => { element.remove(); }, 8000);
        }
        setInterval(createFallingElement, 300); // ความถี่กำลังดีไม่รกจอ
    </script>

</body>
</html>
