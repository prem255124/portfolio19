<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | ม.6</title>
    <style>
        /* --- Reset & Base Settings --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            /* เฉดสีม่วง-ชมพูสุดน่ารัก */
            background: linear-gradient(135deg, #3d1e6d, #8e24aa, #d81b60, #f48fb1);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- แถบเมนูด้านบน --- */
        header {
            background: rgba(61, 30, 109, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid #f48fb1;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #f48fb1;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(244, 143, 177, 0.6);
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #f48fb1;
        }

        /* --- กล่องเนื้อหาหน้าแรก --- */
        section {
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
            max-width: 600px;
            width: 100%;
            z-index: 10;
        }

        .profile-container {
            margin-bottom: 25px;
        }

        /* โค้ดปรับรูปน้องให้เป็นวงกลมเรืองแสง */
        .profile-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f48fb1;
            box-shadow: 0 0 20px rgba(244, 143, 177, 0.6);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #f48fb1;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #8e24aa;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #f48fb1;
            color: white;
        }

        /* --- เอฟเฟกต์ ❄️ และ 🤍 หล่นลงมา --- */
        .falling-element {
            position: absolute;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
            color: rgba(255, 255, 255, 0.85);
            user-select: none;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- เพิ่มแถบเมนูนำทางเพื่อให้กดสลับหน้าง่ายขึ้นบนหน้าแรก -->
    <header>
        <div class="logo">PORTFOLIO ❄️🤍</div>
        <nav>
            <a href="index.html" style="color: #f48fb1;">Home</a>
            <a href="personal.html">Profile</a>
            <a href="education.html">Education</a>
            <a href="activities.html">Activities</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section id="home">
        <div class="content-card">
            <div class="profile-container">
                <!-- พี่ใส่ลิงก์รูปถ่ายนักเรียนม.6 ของน้องลงในนี้เรียบร้อยครับ ดึงจากเซิร์ฟเวอร์หลักชัวร์แน่นอน -->
                <img src="https://imgur.com" alt="รูปภาพโปรไฟล์" class="profile-img">
            </div>
            <h1>ยินดีต้อนรับสู่เว็บไซต์ของฉัน 🤍</h1>
            <p>แฟ้มสะสมผลงานระดับชั้น ม.6 ของฉัน</p>
            <a href="personal.html" class="btn">ทำความรู้จักกันเลย ✨</a>
        </div>
    </section>

    <!-- สคริปต์ทำหิมะและหัวใจตก -->
    <script>
        const elements = ['❄️', '🤍'];
        function createFallingElement() {
            const element = document.createElement('div');
            element.classList.add('falling-element');
            element.innerText = elements[Math.floor(Math.random() * elements.length)];
            element.style.left = Math.random() * 100 + 'vw';
            element.style.fontSize = Math.random() * 15 + 12 + 'px';
            element.style.animationDuration = Math.random() * 4 + 4 + 's';
            element.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(element);
            setTimeout(() => { element.remove(); }, 7000);
        }
        setInterval(createFallingElement, 350);
    </script>

</body>
</html>
