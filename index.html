<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | ม.6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            /* ธีมสีม่วง-ชมพู */
            background: linear-gradient(135deg, #3d1e6d, #8e24aa, #d81b60, #f48fb1);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(61, 30, 109, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid #f48fb1;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #f48fb1;
            font-weight: bold;
            font-size: 22px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        section {
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
            max-width: 600px;
            width: 100%;
            z-index: 10;
        }

        .profile-container {
            margin-bottom: 25px;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f48fb1;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: #f48fb1;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #8e24aa;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        /* --- เอฟเฟกต์ ❄️ และ 🤍 หล่นลงมา --- */
        .falling-element {
            position: absolute;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
            color: rgba(255, 255, 255, 0.85);
            user-select: none;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PORTFOLIO ❄️🤍</div>
    </header>

    <section id="home" class="hero-section">
        <div class="content-card">
            <div class="profile-container">
                <!-- ดึงรูปจากใน GitHub หากน้องอัปโหลดไว้ ให้เปลี่ยนชื่อไฟล์ตรง src ให้ตรงกันครับ -->
                <img src="profile.jpg" alt="รูปภาพโปรไฟล์" class="profile-img">
            </div>
            <h1>ยินดีต้อนรับสู่เว็บไซต์ของฉัน 🤍</h1>
            <p>แฟ้มสะสมผลงานระดับชั้น ม.6 ของฉัน</p>
            <a href="#" class="btn">ทำความรู้จักกันเลย ✨</a>
        </div>
    </section>

    <script>
        const elements = ['❄️', '🤍'];
        function createFallingElement() {
            const element = document.createElement('div');
            element.classList.add('falling-element');
            element.innerText = elements[Math.floor(Math.random() * elements.length)];
            element.style.left = Math.random() * 100 + 'vw';
            element.style.fontSize = Math.random() * 15 + 12 + 'px';
            element.style.animationDuration = Math.random() * 3 + 4 + 's';
            element.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(element);
            setTimeout(() => { element.remove(); }, 7000);
        }
        setInterval(createFallingElement, 350);
    </script>

</body>
</html>
